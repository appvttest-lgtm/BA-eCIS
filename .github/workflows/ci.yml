name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to commit SHAs so a compromised or moved tag cannot
      # change what runs in CI. Update the SHA and the version comment together.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Smoke tests
        run: npm test

      - name: Build
        run: npm run build

      # dist/ is committed so the target environment can run `node server.mjs`
      # with no build step (AGENTS.md section 1). Fail the build when a source
      # change was committed without its regenerated dist/.
      - name: Dist drift gate
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::dist/ is stale - run 'npm run build' and commit the regenerated dist/ with the source change."
            git status --porcelain dist/
            git diff -- dist/ | head -200
            exit 1
          fi
          echo "dist/ matches the committed build."
